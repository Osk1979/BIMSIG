            "title": "Metadata",
            "type": "object"
          }
        },
        "required": [
          "metadata"
        ],
        "title": "AssetMetadataPayload",
        "type": "object"
      },
      "AssetPermissionPayload": {
        "description": "API payload to set one information asset permission.",
