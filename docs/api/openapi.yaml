        "required": [
          "principal",
          "permission"
        ],
        "title": "AssetPermissionPayload",
        "type": "object"
      },
      "AssetVersionPayload": {
        "description": "API payload to register an information asset version.",
        "properties": {
          "checksum_sha256": {
            "anyOf": [
              {
                "type": "string"
              },
              {
                "type": "null"
              }
            ],
            "title": "Checksum Sha256"
          },
          "logical_uri": {
            "minLength": 6,
            "title": "Logical Uri",
            "type": "string"
