name: DevSecOps CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  quality:
    name: Quality, contracts, and tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -e .[dev]

      - name: Lint
        run: python -m ruff check .

      - name: Validate architecture guardrails
        run: python scripts/validate_architecture.py

      - name: Verify OpenAPI contract
        run: |
          python scripts/export_openapi.py
          git diff --exit-code docs/api/openapi.yaml

      - name: Test
        run: python -m pytest

      - name: Alembic migration smoke test
        run: python -m pytest tests/infrastructure/test_alembic_migrations.py

  container:
    name: Container build
    runs-on: ubuntu-latest
    needs: quality

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t corporate-control-tower-rev12:ci .

  visual-e2e:
    name: Visual E2E
    runs-on: ubuntu-latest
    needs: quality

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -e .[dev,e2e]

      - name: Install Playwright browser
        run: python -m playwright install --with-deps chromium

      - name: Run visual E2E tests
        run: python -m pytest tests/e2e

      - name: Upload visual screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: visual-e2e-artifacts
          path: e2e-artifacts
          if-no-files-found: ignore
